name: E2E Tests

on:
  pull_request:
    paths:
      - 'meteor'
      - 'tools/modern-tests/**'
      - 'packages/rspack/**'
      - 'packages/tools-core/**'
      - 'packages/babel-compiler/**'
      - 'packages/meteor-tool/**'
      - 'npm-packages/meteor-rspack/**'
      - 'tools/static-assets/skel-**'
      - '.github/workflows/e2e-tests.yml'

concurrency:
  group: meteor-e2e-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max_old_space_size=12288"

jobs:
  test:
    name: ${{ matrix.category }}
    runs-on: oss-vm
    timeout-minutes: 60
    container:
      image: node:22-bookworm
      options: --cpus 4 --memory 12g --security-opt seccomp=unconfined

    strategy:
      fail-fast: false
      matrix:
        category:
          - Angular
          - Babel
          - Blaze
          - Coffeescript
          - Library
          - Monorepo
          - React
          - R.Router
          - Solid
          - Svelte
          - Typescript
          - Vue

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache dependencies
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            /root/.npm
            /root/.cache/ms-playwright
            dev_bundle
            .babel-cache
            .meteor
            node_modules
          key: e2e-${{ runner.os }}-${{ hashFiles('package-lock.json', 'meteor', 'tools/modern-tests/package.json') }}
          restore-keys: |
            e2e-${{ runner.os }}-

      - name: Install Playwright browsers
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium chromium-headless-shell

      - name: Install Playwright system dependencies
        run: npx playwright install-deps chromium

      - name: Install deps
        run: npm install

      - name: Install test deps
        run: npm run install:e2e

      - name: Prepare Meteor
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: ./meteor --get-ready --allow-superuser

      - name: Run tests for ${{ matrix.category }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 15
          retry_wait_seconds: 90
          command: METEOR_ALLOW_SUPERUSER=1 npm run test:e2e -- -t="${{ matrix.category }}"
