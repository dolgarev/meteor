name: E2E Tests

on:
  pull_request:
    paths:
      - 'meteor'
      - 'tools/modern-tests/**'
      - 'packages/rspack/**'
      - 'packages/tools-core/**'
      - 'packages/babel-compiler/**'
      - 'packages/meteor-tool/**'
      - 'npm-packages/meteor-rspack/**'
      - 'tools/static-assets/skel-**'
      - '.github/workflows/e2e-tests.yml'

concurrency:
  group: meteor-e2e-tests-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_OPTIONS: "--max_old_space_size=12288"

jobs:
  cache-key:
    name: Compute cache key
    runs-on: oss-vm
    outputs:
      hash: ${{ steps.hash.outputs.hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute hash
        id: hash
        run: echo "hash=${{ hashFiles('package-lock.json', 'meteor', 'tools/modern-tests/package.json') }}" >> "$GITHUB_OUTPUT"

  prepare:
    name: Prepare cache
    needs: cache-key
    runs-on: oss-vm
    timeout-minutes: 30
    container:
      image: node:22-bookworm
      volumes:
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/npm:/root/.npm
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/dev-bundle:/github/workspace/dev_bundle
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/playwright:/root/.cache/ms-playwright
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/babel:/github/workspace/.babel-cache
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/dot-meteor:/github/workspace/.meteor

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps for Playwright
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Install deps
        run: npm install

      - name: Install test deps
        run: npm run install:e2e

      - name: Prepare Meteor
        run: ./meteor --get-ready --allow-superuser

  test:
    name: ${{ matrix.category }}
    needs: [cache-key, prepare]
    runs-on: oss-vm
    timeout-minutes: 60
    container:
      image: node:22-bookworm
      options: --cpus 4 --memory 12g
      volumes:
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/npm:/root/.npm
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/dev-bundle:/github/workspace/dev_bundle
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/playwright:/root/.cache/ms-playwright
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/babel:/github/workspace/.babel-cache
        - /cache/meteor/${{ needs.cache-key.outputs.hash }}/dot-meteor:/github/workspace/.meteor

    strategy:
      fail-fast: false
      matrix:
        category:
          - Angular
          - Babel
          - Blaze
          - Coffeescript
          - Library
          - Monorepo
          - React
          - R.Router
          - Solid
          - Svelte
          - Typescript
          - Vue

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system deps for Playwright
        run: npx playwright install --with-deps chromium chromium-headless-shell

      - name: Install deps
        run: npm install

      - name: Install test deps
        run: npm run install:e2e

      - name: Prepare Meteor
        run: ./meteor --get-ready --allow-superuser

      - name: Run tests for ${{ matrix.category }}
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_on: error
          timeout_minutes: 15
          retry_wait_seconds: 90
          command: METEOR_ALLOW_SUPERUSER=1 npm run test:e2e -- -t="${{ matrix.category }}"
