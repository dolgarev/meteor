name: Check code-style
on:
  push:
    paths:
      - 'packages/**'
      - 'npm-packages/meteor-installer/**'
  pull_request:
    paths:
      - 'packages/**'
      - 'npm-packages/meteor-installer/**'
jobs:
  check-code-style:
    runs-on: oss-vm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm ci
      - name: Check formatting with oxfmt
        run: npx oxfmt --ignore-path .fmtignore --check .
      - name: Run lint with oxlint
        run: npm run lint
