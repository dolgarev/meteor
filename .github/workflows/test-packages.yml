name: Test Packages

on:
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/test-packages.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-packages:
    name: "packages / ${{ matrix.group.name }}"
    runs-on: oss-vm
    timeout-minutes: 90
    env:
      CXX: g++-12
      METEOR_HOSTED_CI: "true"

    strategy:
      fail-fast: false
      matrix:
        group:
          - name: accounts
            packages: >-
              accounts-base accounts-password accounts-passwordless accounts-2fa
              accounts-oauth accounts-ui-unstyled check

          - name: auth-social
            packages: >-
              oauth oauth2 oauth-encryption
              facebook-oauth github-oauth google-oauth weibo-oauth
              meetup-oauth meteor-developer-oauth

          - name: database
            packages: >-
              mongo minimongo allow-deny diff-sequence
              geojson-utils binary-heap

          - name: ddp-realtime
            packages: >-
              ddp-client ddp-common ddp-server ddp-rate-limiter
              rate-limit inter-process-messaging reload
              reload-safetybelt routepolicy

          - name: build
            packages: >-
              ecmascript ecmascript-runtime
              typescript minifier-css minifier-js
              static-html-tools
              constraint-solver package-version-parser
              modules-runtime modules-runtime-hot

          - name: webapp
            packages: >-
              webapp webapp-hashing boilerplate-generator-tests server-render
              browser-policy force-ssl-common

          - name: core
            packages: >-
              meteor base64 ejson random tracker
              reactive-dict callback-hook url promise session
              localstorage fetch roles facts-base
              logic-solver test-helpers rspack

    steps:
      - name: Fix workspace permissions
        # Self-hosted runners may leave files owned by root from previous runs.
        run: sudo chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE" || true
        working-directory: /tmp

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Expose globally-installed puppeteer to Node.js
        # puppeteer@23.6.0 is pre-installed on oss-vm via `npm install -g`.
        # Setting NODE_PATH lets `require('puppeteer')` resolve it directly,
        # so run.sh skips the slow `./meteor npm install -g puppeteer` step.
        run: echo "NODE_PATH=$(npm root -g)" >> "$GITHUB_ENV"

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .meteor
            .babel-cache
            dev_bundle
          key: ${{ runner.os }}-meteor-${{ hashFiles('meteor', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-meteor-

      - name: Install system dependencies
        # g++-12 is needed to build native Node.js add-ons (e.g. fibers).
        # All Chromium dependencies are already satisfied on oss-vm.
        run: |
          if ! dpkg -s g++-12 >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y g++-12
          fi

      - name: Run tests (${{ matrix.group.name }})
        run: ./packages/test-in-console/run.sh ${{ matrix.group.packages }}
