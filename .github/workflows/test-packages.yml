name: Test Packages

on:
  pull_request:
    paths:
      - "packages/**"
      - ".github/workflows/test-packages.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-packages:
    name: "packages / ${{ matrix.group.name }}"
    runs-on: oss-vm
    timeout-minutes: 90
    env:
      CXX: g++-12
      METEOR_HOSTED_CI: "true"

    strategy:
      fail-fast: false
      matrix:
        group:
          - name: accounts
            packages: >-
              accounts-base accounts-password accounts-passwordless accounts-2fa
              accounts-oauth accounts-ui accounts-ui-unstyled
              audit-argument-checks check service-configuration

          - name: auth-social
            packages: >-
              oauth oauth2 oauth-encryption
              accounts-facebook accounts-github accounts-google accounts-twitter
              accounts-weibo accounts-meetup accounts-meteor-developer
              facebook-oauth github-oauth google-oauth weibo-oauth
              meetup-oauth meteor-developer-oauth
              facebook-config-ui github-config-ui google-config-ui
              twitter-config-ui weibo-config-ui

          - name: database
            packages: >-
              mongo minimongo allow-deny diff-sequence mongo-id disable-oplog
              geojson-utils id-map ordered-dict binary-heap
              mongo-livedata npm-mongo npm-mongo-legacy

          - name: ddp-realtime
            packages: >-
              ddp ddp-client ddp-common ddp-server ddp-rate-limiter
              rate-limit inter-process-messaging autoupdate reload
              reload-safetybelt routepolicy

          - name: build
            packages: >-
              babel-compiler babel-runtime ecmascript ecmascript-runtime
              ecmascript-runtime-client ecmascript-runtime-server
              caching-compiler typescript minifier-css minifier-js
              standard-minifier-css static-html-tools es5-shim
              constraint-solver package-version-parser
              modules modules-runtime modules-runtime-hot

          - name: webapp
            packages: >-
              webapp webapp-hashing boilerplate-generator
              boilerplate-generator-tests hot-code-push server-render
              browser-policy browser-policy-common browser-policy-content
              browser-policy-framing shell-server force-ssl force-ssl-common
              dev-error-overlay react-fast-refresh

          - name: core
            packages: >-
              meteor core-runtime base64 ejson random tracker reactive-var
              reactive-dict callback-hook retry url promise session
              dynamic-import localstorage fetch roles facts-base facts-ui
              logic-solver insecure autopublish test-helpers rspack

    steps:
      - name: Fix workspace permissions
        # Self-hosted runners may leave files owned by root from previous runs.
        run: sudo chown -R "$(id -un):$(id -gn)" "$GITHUB_WORKSPACE" || true
        working-directory: /tmp

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build test container image
        # Build once per runner; subsequent matrix jobs on the same machine hit
        # the Docker layer cache and finish in seconds.
        # The build context is limited to .github/docker/ — no source code is
        # sent to the daemon, keeping the build fast.
        run: |
          docker build \
            --file .github/docker/test-packages.Dockerfile \
            --tag meteor-test-packages:local \
            --cache-from meteor-test-packages:local \
            .github/docker

      - name: Restore caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            .meteor
            .babel-cache
            dev_bundle
          key: ${{ runner.os }}-meteor-${{ hashFiles('meteor', '**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-meteor-

      - name: Run tests (${{ matrix.group.name }})
        # Each matrix job runs inside its own Docker container so that
        # concurrent suites on the same oss-vm get isolated network namespaces.
        # This prevents port 4096 and Meteor's embedded MongoDB from colliding
        # with sibling jobs running on the same host.
        #
        # Key flags:
        #   --rm               — discard the container after the run
        #   --shm-size=2gb     — Chrome requires more shared memory than Docker's 64 MB default
        #   --user             — run as the runner uid/gid so volume-mounted files
        #                        (workspace, home dir) retain their original ownership
        #   -v WORKSPACE       — the checked-out source and all restored caches
        #                        (.meteor, dev_bundle, .babel-cache) live here
        #   -v HOME:HOME       — bind-mount the runner's real home directory at the
        #                        same path inside the container. This lets Chrome's
        #                        crashpad write to $HOME/.local (the runner uid owns
        #                        the host path, so the write succeeds), and lets
        #                        Meteor read/write $HOME/.meteor without hitting
        #                        first-run interactive prompts in a bare /tmp.
        #                        The npm cache ($HOME/.npm) is included automatically.
        run: |
          docker run --rm \
            --shm-size=2gb \
            --user "$(id -u):$(id -g)" \
            --env HOME="$HOME" \
            --env CXX=g++-12 \
            --env METEOR_HOSTED_CI=true \
            --env NODE_PATH=/usr/local/lib/node_modules \
            --env PUPPETEER_SKIP_CHROMIUM_DOWNLOAD=true \
            --env PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable \
            -v "$GITHUB_WORKSPACE:$GITHUB_WORKSPACE" \
            -v "$HOME:$HOME" \
            -w "$GITHUB_WORKSPACE" \
            meteor-test-packages:local \
            ./packages/test-in-console/run.sh ${{ matrix.group.packages }}
