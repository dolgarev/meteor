          path: ./tmp/results
          if-no-files-found: ignore

  # ─── Test Group 2 ─────────────────────────────────────────────────────────────
  # Note: Gradle and Java are pre-installed in the meteor/circleci Docker image.
  test-group-2:
    name: "Test Group 2 (^co[n-z])"
    runs-on: oss-vm
    container:
      image: meteor/circleci:2025.07.8-android-35-node-22
